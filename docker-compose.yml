services:
  postgres:
    image: postgres:16-alpine
    container_name: tripio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tripio
      POSTGRES_USER: tripio
      POSTGRES_PASSWORD: tripio
    ports:
      - "5432:5432"
    volumes:
      - tripio-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripio -d tripio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  tripio-postgres-data:
